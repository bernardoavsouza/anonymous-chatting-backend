name: CD Pipeline

on:
  workflow_run:
    workflows: [CI Pipeline]
    types: completed

env:
  IMAGE_NAME: ${{secrets.GCP_LOCATION}}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/anonymous-chatting/backend
  PROJECT_NAME: anonymous-chatting-backend

jobs:
  image-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_CRED }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          registry: ${{ secrets.GCP_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_CRED }}

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}

  deploy-image:
    runs-on: ubuntu-latest
    needs: image-push
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_CRED }}

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          registry: ${{ secrets.GCP_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_CRED }}

      - name: Docker pull
        run: docker pull ${{ env.IMAGE_NAME }}

      - name: Deploy image
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          service: ${{ env.PROJECT_NAME }}
          region: ${{ secrets.GCP_LOCATION }}
          flags: |
            --port 3000
            --allow-unauthenticated
            --max-instances 1
            --timeout 5m
